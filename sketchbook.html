<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geonu Jo — Sketchbook</title>
  
  <script src="sketch-data.js"></script>

  <style>
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Regular.ttf') format('truetype'); font-weight:400; }
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Medium.ttf') format('truetype'); font-weight:500; }
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Bold.ttf') format('truetype'); font-weight:700; }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Poppins',sans-serif; }

    body {
      background-color:#b8b8b8;
      background-image:radial-gradient(circle, #999 1px, transparent 1px);
      background-size:28px 28px;
    }

    #board { position:absolute; inset:0; user-select:none; }

    .sketch {
      position:absolute; background:#fff;
      box-shadow:0 4px 24px rgba(0,0,0,0.18);
      cursor:grab; will-change:left,top;
      transition:box-shadow 0.25s ease;
    }
    .sketch.dragging { cursor:grabbing; box-shadow:0 12px 40px rgba(0,0,0,0.32); }
    
    .sketch img {
      display:block; width:100%; height:100%;
      object-fit:fill; pointer-events:none; 
      user-select:none; -webkit-user-drag:none;
    }

    .sketch-info {
      position:absolute;
      bottom:0; left:0; right:0;
      background: rgba(13, 13, 17, 0.7);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding:0.5em 0.8em;
      display:flex;
      justify-content:space-between;
      align-items:baseline;
      gap:8px;
      opacity:0;
      transition:opacity 0.18s ease;
      pointer-events:none;
      z-index: 5;
    }
    .sketch:hover .sketch-info { opacity:1; }
    
    .sketch-info-project {
      font-size:clamp(12px, 0.9vw, 15px);
      font-family:'Poppins', sans-serif;
      font-weight:400;
      color:#fff;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .sketch-info-project strong { font-weight:700; }

    .sketch-info-project.clickable {
      pointer-events: auto !important;
    }
    .sketch-info-project.clickable strong {
      cursor: pointer !important;
      display: inline-block;
    }
    .sketch-info-project.clickable strong:hover {
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    
    .sketch-info-date {
      font-size:clamp(12px, 0.9vw, 15px);
      font-family:'Poppins', sans-serif;
      font-weight:400;
      color:#fff;
      white-space:nowrap;
      flex-shrink:0;
    }

    /* ── 모바일 카루셀 갤러리 변환 (양옆 카드 노출) ── */
    @media (max-width: 768px), (max-width: 915px) and (orientation: landscape) {
      #board {
        display: flex;
        width: 100%;
        height: 100%;
        overflow-x: auto;
        overflow-y: hidden; 
        scroll-snap-type: x mandatory;
        scroll-behavior: smooth;
        -webkit-overflow-scrolling: touch;
        /* ★ 요구사항: 양옆 다른 스케치가 튀어나와 인지되도록 배치 가속 여백 확보 */
        padding-left: 9vw;  
        padding-right: 9vw;
      }
      #board::-webkit-scrollbar { display: none; } 

      .sketch {
        position: relative !important;
        left: 0 !important; top: 0 !important;
        width: 82vw !important; /* ★ 가로폭을 줄여 이전/다음 스케치가 좌우측에 걸치게 연동 */
        height: 100svh !important; 
        flex-shrink: 0;
        background: transparent;
        box-shadow: none;
        display: flex;
        align-items: center;
        justify-content: center;
        scroll-snap-align: center; 
        padding: 0 12px; 
        cursor: default;
      }
      
      .sketch img {
        width: auto;
        height: auto;
        max-width: 100%;
        max-height: 66vh;
        object-fit: contain;
        background: #fff;
        box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        pointer-events: auto !important; 
        cursor: pointer;
      }

      .sketch-info {
        opacity: 1 !important;
        bottom: 24px; left: 12px; right: 12px;
        border-radius: 8px;
        pointer-events: auto;
      }
    }
    @media (max-width: 915px) and (orientation: landscape) {
      #board { padding-left: 14vw; padding-right: 14vw; }
      .sketch { width: 72vw !important; padding: 20px 12px; height: 100svh !important; }
      .sketch img { max-height: 52vh !important; }
      .sketch-info { bottom: 6px; padding: 0.3em 0.8em; }
    }
  </style>
</head>
<body>
<div id="board"></div>

<script>
const SKETCH_FILES = Array.from({ length: 16 }, (_, i) => `source/sketches/${String(i + 1).padStart(2, '0')}.jpg`);
const SKETCH_W = window.innerWidth * 0.30;
const board = document.getElementById('board');
let zTop = 100;
const rand = (a,b) => Math.random()*(b-a)+a;

function isMobileView() {
  return window.innerWidth <= 768 || (window.innerWidth <= 915 && window.innerHeight < window.innerWidth);
}

function placeSketch(src, idx) {
  const img = new Image(); img.src = src;
  const place = () => {
    const vw = window.innerWidth;
    const vh = window.innerHeight;
    const w  = SKETCH_W;
    const h  = img.naturalWidth ? w/(img.naturalWidth/img.naturalHeight) : w/1.6;

    const x = Math.max(0, Math.min(vw - w, rand(0, vw - w)));
    const y = Math.max(0, Math.min(vh - h, rand(0, vh - h)));

    const el = document.createElement('div');
    el.className = 'sketch';
    
    const mobile = isMobileView();
    if (!mobile) {
      el.style.cssText = `width:${w}px;height:${h}px;left:${x}px;top:${y}px;z-index:${idx+1};`;
    }

    img.alt=''; img.draggable=false;
    if (!mobile) {
      img.style.cssText='display:block;width:100%;height:100%;object-fit:fill;pointer-events:none;user-select:none;-webkit-user-drag:none;';
    }
    el.appendChild(img);

    const key = String(idx+1).padStart(2,'0');
    const meta = (typeof sketchMeta !== 'undefined' && sketchMeta[key]) || { project:'<N/A>', date:'<N/A>' };
    
    const info = document.createElement('div');
    info.className = 'sketch-info';
    
    const isClickable = meta.project !== 'N/A' && meta.project !== '<N/A>';
    const clickableClass = isClickable ? 'clickable' : '';

    info.innerHTML = `<span class="sketch-info-project ${clickableClass}">from <strong>${meta.project}</strong></span><span class="sketch-info-date">${meta.date}</span>`;
    el.appendChild(info);

    /* ★ 라이트박스 신호 송출부 수신 연동 정상화 개수 처리 */
    const triggerLightbox = (e) => {
      if (!isClickable) return;
      e.preventDefault();
      e.stopPropagation();
      
      let projectKey = '';
      const normName = meta.project.replace('*', '').toLowerCase();
      
      if (normName.includes('bloom')) projectKey = 'volvo-bloom';
      else if (normName.includes('stormgazer')) projectKey = 'hyundai-stormgazer';
      else if (normName.includes('play')) projectKey = 'polestar-play';
      else if (normName.includes('side project')) projectKey = 'side-projects';

      if (projectKey) {
        const targetPage = meta.page || 1;
        // 부모 전송 객체 window.parent 통일
        window.parent.postMessage({ 
          type: 'open-project-lightbox', 
          key: projectKey,
          page: targetPage 
        }, '*');
      }
    };

    if (mobile) {
      let touchMoveFlag = false;
      img.addEventListener('touchmove', () => { touchMoveFlag = true; }, { passive: true });
      img.addEventListener('touchend', (e) => {
        if (!touchMoveFlag) {
          triggerLightbox(e);
        }
        touchMoveFlag = false;
      });
      img.addEventListener('click', triggerLightbox);
    }

    if (isClickable) {
      const projectBtn = info.querySelector('.sketch-info-project strong');
      projectBtn.addEventListener('pointerdown', (e) => { e.stopPropagation(); });
      projectBtn.addEventListener('click', triggerLightbox);
    }

    board.appendChild(el);
    if (!mobile) {
      makeDraggable(el);
    }
  };
  
  if (img.complete && img.naturalWidth) place();
  else { img.onload = place; img.onerror = place; }
}

SKETCH_FILES.forEach((s,i) => setTimeout(()=>placeSketch(s,i), i*60));

function makeDraggable(el) {
  let active=false, sx,sy,ox,oy;
  el.addEventListener('pointerdown', e => {
    if (e.button!==0 || isMobileView()) return;
    e.preventDefault(); e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    el.style.zIndex = ++zTop;
    active=true; sx=e.clientX; sy=e.clientY;
    ox=parseFloat(el.style.left); oy=parseFloat(el.style.top);
    el.classList.add('dragging');
  });
  el.addEventListener('pointermove', e => {
    if (!active) return;
    el.style.left=(ox+e.clientX-sx)+'px';
    el.style.top =(oy+e.clientY-sy)+'px';
  });
  const end=()=>{ active=false; el.classList.remove('dragging'); };
  el.addEventListener('pointerup', end);
  el.addEventListener('pointercancel', end);
}

// ★ 모바일 스케치북 면적 터치 스와이프 상하 전이 브릿지 복원
let touchY0 = null;
window.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', e => {
  if (touchY0 === null || !isMobileView()) return;
  const dy = touchY0 - e.changedTouches[0].clientY;
  touchY0 = null;
  if (Math.abs(dy) > 60) {
    window.parent.postMessage(dy > 0 ? 'scroll-down-edge' : 'scroll-up-edge', '*');
  }
}, {passive:true});

let wheelAccum=0, wheelTimer=null;
window.addEventListener('wheel', e => {
  if (isMobileView()) {
    wheelAccum += e.deltaY;
    clearTimeout(wheelTimer);
    wheelTimer = setTimeout(()=>{ wheelAccum=0; }, 200);
    if (Math.abs(wheelAccum) < 40) return;
    window.parent.postMessage(wheelAccum > 0 ? 'scroll-down-edge' : 'scroll-up-edge', '*');
    wheelAccum = 0;
    return;
  }
  wheelAccum += e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer = setTimeout(()=>{ wheelAccum=0; }, 200);
  if (Math.abs(wheelAccum) < 50) return;
  const dir = wheelAccum > 0 ? 1 : -1;
  wheelAccum = 0;
  if (dir < 0) window.parent.postMessage('scroll-up-edge',   '*');
  if (dir > 0) window.parent.postMessage('scroll-down-edge', '*');
}, {passive:true});
</script>
</body>
</html>
