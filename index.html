<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geonu Jo — Archive</title>
  <style>
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Regular.ttf') format('truetype'); font-weight:400; }
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Medium.ttf') format('truetype'); font-weight:500; }
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Bold.ttf') format('truetype'); font-weight:700; }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Poppins',sans-serif; font-weight:400; }

    /* ── FIXED HEADER (always on top, above everything) ── */
    #global-nav {
      position:fixed; top:0; left:0; right:0;
      z-index:500;
      display:flex; align-items:baseline;
      padding:28px 48px 0;
      pointer-events:none; /* let clicks pass through to pages below */
    }
    #global-nav * { pointer-events:auto; }
    .nav-name  { font-size:0.95rem; font-weight:400; min-width:160px; color:#111; }
    .nav-title { font-size:0.95rem; font-weight:400; min-width:220px; color:#111; }
    .nav-year  { font-size:0.95rem; font-weight:400; flex:1; color:#111; }
    .nav-links { display:flex; gap:40px; }
    .nav-links a {
      font-size:0.95rem; font-weight:400; color:#111;
      text-decoration:none;
    }
    .nav-links a.active { text-decoration:underline; text-underline-offset:3px; }
    .nav-links a:hover  { text-decoration:underline; text-underline-offset:3px; }

    /* Nav text turns light on sketch page */
    #global-nav.on-sketches .nav-name,
    #global-nav.on-sketches .nav-title,
    #global-nav.on-sketches .nav-year,
    #global-nav.on-sketches .nav-links a { color:#e8e8e8; }

    /* ── PAGES CONTAINER ── */
    #scroll-container { position:fixed; inset:0; overflow:hidden; }

    #pages-wrapper {
      width:100%;
      transition: transform 0.85s cubic-bezier(0.76,0,0.24,1);
      will-change: transform;
    }

    .page { width:100%; height:100vh; position:relative; }

    /* ── PAGE 1: PROJECTS ── */
    #page-projects {
      background:#fff;
      overflow-y:auto;
      overflow-x:hidden;
    }

    /* ── PAGE 2: SKETCHES ── */
    #page-sketches {
      background-color:#b8b8b8;
      background-image:radial-gradient(circle, #999 1px, transparent 1px);
      background-size:28px 28px;
      overflow:hidden;
    }

    /* ── PAGE 3: ABOUT ── */
    #page-about { background:#fff; }
    #about-iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }

    /* ── PROJECT LIST ── */
    .project-list {
      padding:80px 48px 80px; /* top pad accounts for fixed nav */
      display:flex;
      flex-direction:column;
      gap:80px;
    }

    .project-cover {
      width:100%;
      aspect-ratio:16/7;
      overflow:hidden;
      cursor:pointer;
    }
    .project-cover img {
      width:100%; height:100%;
      object-fit:cover; display:block;
      transition:opacity 0.3s ease;
    }
    .project-cover:hover img { opacity:0.9; }

    .project-meta {
      display:grid;
      grid-template-columns: 80px 1fr 1fr 1fr 1fr;
      padding-top:14px;
      align-items:start;
    }
    .project-num   { font-size:0.82rem; color:#111; }
    .project-title { font-size:0.82rem; color:#111; }
    .project-title strong { font-weight:700; }
    .project-context { font-size:0.82rem; color:#111; }
    .project-tags {
      font-size:0.82rem; color:#111;
      display:flex; flex-direction:column; gap:2px;
    }
    .project-date { font-size:0.82rem; color:#111; text-align:right; }

    /* ── LIGHTBOX ── */
    #lightbox {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,0);
      display:none;
      overflow-y:auto;
      transition:background 0.4s ease;
    }
    #lightbox.visible { background:rgba(0,0,0,0.88); }
    #lightbox-inner {
      max-width:900px; margin:0 auto;
      padding:80px 24px 120px;
      display:flex; flex-direction:column; gap:8px;
      opacity:0; transform:translateY(20px);
      transition:opacity 0.4s ease, transform 0.4s ease;
    }
    #lightbox.visible #lightbox-inner { opacity:1; transform:translateY(0); }
    #lightbox-inner img { width:100%; display:block; }
    #lightbox-close {
      position:fixed; top:28px; right:48px;
      font-size:0.85rem; color:#fff; cursor:pointer;
      font-family:'Poppins',sans-serif; z-index:1001;
      opacity:0; transition:opacity 0.4s ease;
    }
    #lightbox.visible #lightbox-close { opacity:1; }
    #lightbox-close:hover { text-decoration:underline; }

    /* ── SKETCH BOARD ── */
    #board { position:absolute; inset:0; user-select:none; }
    .sketch {
      position:absolute; background:#fff;
      box-shadow:0 4px 24px rgba(0,0,0,0.18);
      cursor:grab; will-change:left,top;
      transition:box-shadow 0.25s ease;
    }
    .sketch.dragging {
      cursor:grabbing;
      box-shadow:0 12px 40px rgba(0,0,0,0.32);
    }
    .sketch img {
      display:block; width:100%; height:100%;
      object-fit:fill; pointer-events:none;
      user-select:none; -webkit-user-drag:none;
    }
  </style>
</head>
<body>

<!-- FIXED NAV -->
<nav id="global-nav">
  <span class="nav-name">Geonu Jo</span>
  <span class="nav-title">Mobility Design Portfolio</span>
  <span class="nav-year">2026</span>
  <div class="nav-links">
    <a href="#" id="nav-archive" class="active">Archive</a>
    <a href="#" id="nav-about">About</a>
  </div>
</nav>

<!-- PAGES -->
<div id="scroll-container">
  <div id="pages-wrapper">

    <!-- PAGE 1: PROJECTS -->
    <div class="page" id="page-projects">
      <div class="project-list">
        <div class="project-item">
          <div class="project-cover" data-project="volvo-bloom">
            <img src="source/projects/volvo-bloom/images/00.jpg" alt="Volvo BLOOM*" />
          </div>
          <div class="project-meta">
            <span class="project-num">01</span>
            <span class="project-title">Volvo <strong>BLOOM*</strong></span>
            <span class="project-context">Volvo Design Competition 2026</span>
            <span class="project-tags">
              <span>Exterior Design</span>
              <span>Interior Design</span>
              <span>3D Modeling</span>
            </span>
            <span class="project-date">Mar.2026. (1 month)</span>
          </div>
        </div>
      </div>
    </div>

    <!-- PAGE 2: SKETCHES -->
    <div class="page" id="page-sketches">
      <div id="board"></div>
    </div>

    <!-- PAGE 3: ABOUT -->
    <div class="page" id="page-about">
      <iframe id="about-iframe" src="about.html" title="About"></iframe>
    </div>

  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span id="lightbox-close">✕ close</span>
  <div id="lightbox-inner"></div>
</div>

<script>
/* ═══════════════════════════════════
   PAGE SNAPPING
═══════════════════════════════════ */
const pagesWrapper  = document.getElementById('pages-wrapper');
const projectPage   = document.getElementById('page-projects');
const globalNav     = document.getElementById('global-nav');

let currentPage  = 0;
let isAnimating  = false;

const PAGE_COUNT = 3;
const ANIM_MS    = 900; // must match CSS transition duration

function goToPage(n, force) {
  n = Math.max(0, Math.min(PAGE_COUNT - 1, n));
  if (!force && (n === currentPage || isAnimating)) return;
  currentPage = n;
  isAnimating = true;

  const pct = n === 0 ? 0 : n === 1 ? -100 : -200;
  pagesWrapper.style.transform = `translateY(${pct}vh)`;

  // Update nav active state
  document.getElementById('nav-archive').classList.toggle('active', n < 2);
  document.getElementById('nav-about').classList.toggle('active', n === 2);

  // Toggle nav colour for sketch page
  globalNav.classList.toggle('on-sketches', n === 1);

  setTimeout(() => { isAnimating = false; }, ANIM_MS);
}

// Nav clicks
document.getElementById('nav-archive').addEventListener('click', e => { e.preventDefault(); goToPage(0); });
document.getElementById('nav-about').addEventListener('click',   e => { e.preventDefault(); goToPage(2); });

/* ── Wheel handling ──
   Strategy: accumulate deltaY with debounce.
   Only fire once per distinct scroll gesture. */
let wheelAccum  = 0;
let wheelTimer  = null;
const WHEEL_THRESHOLD = 50;

window.addEventListener('wheel', (e) => {
  // Lightbox intercepts scroll
  if (document.getElementById('lightbox').classList.contains('visible')) return;

  // On project page: let internal scroll happen first
  if (currentPage === 0) {
    const atBottom = projectPage.scrollTop + projectPage.clientHeight >= projectPage.scrollHeight - 4;
    const atTop    = projectPage.scrollTop <= 0;
    if (e.deltaY > 0 && !atBottom) return; // still scrolling inside
    if (e.deltaY < 0 && !atTop)    return;
    if (e.deltaY < 0 && atTop)     return; // already page 0, nowhere to go up
  }

  // On about page (iframe): detect edge via flag sent by iframe postMessage
  // For now rely on accumulation debounce

  wheelAccum += e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer = setTimeout(() => { wheelAccum = 0; }, 200);

  if (Math.abs(wheelAccum) < WHEEL_THRESHOLD) return;

  const dir = wheelAccum > 0 ? 1 : -1;
  wheelAccum = 0;
  clearTimeout(wheelTimer);

  if (!isAnimating) goToPage(currentPage + dir);
}, { passive: true });

/* ── Receive messages from about.html iframe ── */
window.addEventListener('message', (e) => {
  if (e.data === 'scroll-up-edge'   && !isAnimating) goToPage(currentPage - 1);
  if (e.data === 'scroll-down-edge' && !isAnimating) goToPage(currentPage + 1);
});

/* ── Touch swipe ── */
let touchY0 = null;
window.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', e => {
  if (touchY0 === null || isAnimating) return;
  const dy = touchY0 - e.changedTouches[0].clientY;
  touchY0 = null;
  if (Math.abs(dy) < 40) return;
  goToPage(currentPage + (dy > 0 ? 1 : -1));
}, {passive:true});

/* ═══════════════════════════════════
   LIGHTBOX
═══════════════════════════════════ */
const PROJECTS = {
  'volvo-bloom': {
    path:   'source/projects/volvo-bloom/images/',
    images: Array.from({length:16}, (_,i) => String(i+1).padStart(2,'0') + '.jpg')
  }
};

function openLightbox(key) {
  const proj = PROJECTS[key]; if (!proj) return;
  const lb    = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  inner.innerHTML = '';
  proj.images.forEach(f => {
    const img = document.createElement('img');
    img.src = proj.path + f; img.alt = f;
    inner.appendChild(img);
  });
  lb.style.display = 'block';
  lb.scrollTop = 0;
  requestAnimationFrame(() => lb.classList.add('visible'));
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('visible');
  setTimeout(() => {
    lb.style.display = 'none';
    document.getElementById('lightbox-inner').innerHTML = '';
  }, 420);
}

document.querySelectorAll('.project-cover').forEach(el =>
  el.addEventListener('click', () => openLightbox(el.dataset.project))
);
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeLightbox();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

/* ═══════════════════════════════════
   SKETCH BOARD
═══════════════════════════════════ */
const SKETCH_FILES = [
  'source/sketches/01.jpg','source/sketches/02.jpg','source/sketches/03.jpg',
  'source/sketches/04.jpg','source/sketches/05.jpg','source/sketches/06.jpg',
  'source/sketches/07.jpg','source/sketches/08.jpg','source/sketches/09.jpg',
  'source/sketches/10.jpg',
];
const MIN_W = 260, MAX_W = 500;
const board = document.getElementById('board');
let zTop = 10;
const rand = (a,b) => Math.random()*(b-a)+a;

function placeSketch(src, idx) {
  const img = new Image();
  img.src = src;
  const place = () => {
    const br = document.getElementById('page-sketches').getBoundingClientRect();
    const w  = rand(MIN_W, MAX_W);
    const h  = w / (img.naturalWidth / img.naturalHeight);
    const x  = rand(br.width*0.05,  br.width*0.75)  - w/2 + br.width*0.12;
    const y  = rand(br.height*0.08, br.height*0.72) - h/2 + br.height*0.1;

    const el = document.createElement('div');
    el.className = 'sketch';
    el.style.cssText = `width:${w}px;height:${h}px;left:${x}px;top:${y}px;z-index:${idx+1};`;
    img.alt=''; img.draggable=false;
    img.style.cssText='display:block;width:100%;height:100%;object-fit:fill;pointer-events:none;user-select:none;-webkit-user-drag:none;';
    el.appendChild(img);
    board.appendChild(el);
    makeDraggable(el);
  };
  if (img.complete && img.naturalWidth) place();
  else { img.onload = place; img.onerror = place; }
}

SKETCH_FILES.forEach((s,i) => setTimeout(() => placeSketch(s,i), i*60));

function makeDraggable(el) {
  let active=false, sx,sy,ox,oy;
  el.addEventListener('pointerdown', e => {
    if (e.button !== 0) return;
    e.preventDefault(); e.stopPropagation();
    el.setPointerCapture(e.pointerId);
    el.style.zIndex = ++zTop;
    active=true; sx=e.clientX; sy=e.clientY;
    ox=parseFloat(el.style.left); oy=parseFloat(el.style.top);
    el.classList.add('dragging');
  });
  el.addEventListener('pointermove', e => {
    if (!active) return;
    el.style.left = (ox + e.clientX - sx) + 'px';
    el.style.top  = (oy + e.clientY - sy) + 'px';
  });
  const end = () => { active=false; el.classList.remove('dragging'); };
  el.addEventListener('pointerup',     end);
  el.addEventListener('pointercancel', end);
}
</script>
</body>
</html>
