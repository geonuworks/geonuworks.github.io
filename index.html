<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geonu Jo — Archive</title>
  <style>
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Regular.ttf') format('truetype'); font-weight:400; }
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Medium.ttf') format('truetype'); font-weight:500; }
    @font-face { font-family:'Poppins'; src:url('source/fonts/Poppins-Bold.ttf') format('truetype'); font-weight:700; }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html, body { width:100%; height:100%; overflow:hidden; font-family:'Poppins',sans-serif; font-weight:400; color:#0D0D11; }

    #global-nav {
      position:fixed; top:0; left:0; right:0; z-index:500;
      display:flex; align-items:baseline;
      padding:28px 48px 0;
      pointer-events:none;
    }
    #global-nav * { pointer-events:auto; }
    
    .nav-name  { font-size:0.95rem; font-weight:400; width:220px; flex-shrink:0; color:#0D0D11; transition: color 0.5s ease; }
    .nav-title { font-size:0.95rem; font-weight:400; color:#0D0D11; transition: color 0.5s ease; }
    .nav-year  { font-size:0.95rem; font-weight:400; flex:1; padding-left:40px; color:#0D0D11; transition: color 0.5s ease; }
    
    .nav-links { display:flex; gap:40px; }
    .nav-links a { font-size:0.95rem; font-weight:400; color:#0D0D11; text-decoration:none; transition: color 0.5s ease; } /* 여기도 추가 */
    
    .nav-links a.active { text-decoration:underline; text-underline-offset:3px; }
    .nav-links a:hover  { text-decoration:underline; text-underline-offset:3px; }
    
    #global-nav.on-sketchbook .nav-name,
    #global-nav.on-sketchbook .nav-title,
    #global-nav.on-sketchbook .nav-year,
    #global-nav.on-sketchbook .nav-links a { color:#e8e8e8; }

    /* ── PAGE SCROLL ── */
    #scroll-container { position:fixed; inset:0; overflow:hidden; }
    #pages-wrapper {
      width:100%; 
      transition: transform 0.85s cubic-bezier(0.76,0,0.24,1);
      will-change: transform;
    }
    .page { width:100%; height:100vh; position:relative; }

    /* ── PAGE 1: ARCHIVE ── */
    #page-archive { background:#fff; display:flex; }

    /* Left sidebar */
    .archive-sidebar {
      width:220px;
      flex-shrink:0;
      padding:110px 0 48px 48px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .project-nav-item {
      font-size:0.88rem;
      font-weight:400;
      color:#878788;
      cursor:pointer;
      line-height:1.5;
      transition:color 0.2s;
      white-space:nowrap;
    }
    .project-nav-item strong { font-weight:700; }
    .project-nav-item.active { color:#0D0D11; text-decoration:underline; text-underline-offset:3px; }
    .project-nav-item:hover { color:#0D0D11; }

    /* Right content area */
    .archive-content {
      flex:1;
      padding:96px 48px 48px;
      display:flex;
      flex-direction:column;
      overflow:hidden;
    }

    #archive-cover {
      position: relative;
      width: 100%;
      aspect-ratio: 16/7;
      box-shadow: 0 12px 64px rgba(0,0,0,0.12);
      background: transparent;
      flex-shrink: 0;
      cursor: pointer;
    }

    .cover-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      z-index: 1;
      transition: opacity 0.5s cubic-bezier(0.25, 1, 0.5, 1);
      will-change: opacity;
    }

    .cover-layer img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .cover-layer.active {
      opacity: 1;
      z-index: 3;
    }

    .cover-layer img:hover { 
      opacity: 0.88;
    }

    /* Meta row */
    .project-meta {
      display:grid;
      grid-template-columns: 80px 1fr 1fr 1fr;
      padding-top:14px;
      flex-shrink:0;
    }
    .meta-num     { font-size:0.82rem; color:#0D0D11; }
    .meta-context { font-size:0.82rem; color:#0D0D11; }
    .meta-tags    { font-size:0.82rem; color:#0D0D11; display:flex; flex-direction:column; gap:2px; }
    .meta-date    { font-size:0.82rem; color:#0D0D11; text-align:right; }

    /* ── PAGE 2: SKETCHBOOK (iframe) ── */
    #page-sketchbook { background:#b8b8b8; }

    /* ── PAGE 3: ABOUT ── */
    #page-about { background:#fff; }
    #about-iframe { position:absolute; inset:0; width:100%; height:100%; border:none; }

    /* ── LIGHTBOX ── */
    #lightbox {
      position:fixed; inset:0; z-index:1000;
      background:rgba(0,0,0,0); display:none;
      overflow-y:auto;
      transition:background 0.4s ease;
    }
    #lightbox.visible { background:rgba(0,0,0,0.88); }
    #lightbox-inner {
      width: calc(100% - 96px);
      margin: 0 auto;
      padding: 80px 0 120px;
      display:flex; flex-direction:column;
      opacity:0; transform:translateY(20px);
      transition:opacity 0.4s ease, transform 0.4s ease;
    }
    #lightbox.visible #lightbox-inner { opacity:1; transform:translateY(0); }
    #lightbox-inner img { width:100%; display:block; margin-bottom:0; }
    #lightbox-close {
      position:fixed; top:28px; right:48px;
      font-size:0.85rem; color:#fff; cursor:pointer;
      font-family:'Poppins',sans-serif; z-index:1001;
      opacity:0; transition:opacity 0.4s ease;
    }
    #lightbox.visible #lightbox-close { opacity:1; }
    #lightbox-close:hover { text-decoration:underline; }
  </style>
</head>
<body>

<nav id="global-nav">
  <span class="nav-name">Geonu Jo</span>
  <span class="nav-title">Motions in Preferable Future</span>
  <span class="nav-year">2026</span>
  <div class="nav-links">
    <a href="#" id="nav-archive" class="active">Archive</a>
    <a href="#" id="nav-sketchbook">Sketchbook</a>
    <a href="#" id="nav-about">About</a>
  </div>
</nav>

<div id="scroll-container">
  <div id="pages-wrapper">

    <div class="page" id="page-archive">
      <aside class="archive-sidebar">
        <div class="project-nav-item active" data-key="volvo-bloom">
          Volvo <strong>BLOOM*</strong>
        </div>
        <div class="project-nav-item" data-key="hyundai-stormgazer">
          HYUNDAI <strong>STORMGAZER</strong>
        </div>
        <div class="project-nav-item" data-key="polestar-play">
          Polestar <strong>PLAY!</strong>
        </div>
        <div class="project-nav-item" data-key="kia-gaia">
          KIA <strong>GAIA</strong> (WIP)
        </div>
        <div class="project-nav-item" data-key="side-projects">
          Side Projects
        </div>
      </aside>

      <div class="archive-content">
        <div id="archive-cover"></div>
        
        <div class="project-meta">
          <span class="meta-num" id="meta-num"></span>
          <span class="meta-context" id="meta-context"></span>
          <span class="meta-tags" id="meta-tags"></span>
          <span class="meta-date" id="meta-date"></span>
        </div>
      </div>
    </div>

    <div class="page" id="page-sketchbook">
      <iframe src="sketchbook.html" style="position:absolute;inset:0;width:100%;height:100%;border:none;" title="Sketchbook"></iframe>
    </div>

    <div class="page" id="page-about">
      <iframe id="about-iframe" src="about.html" title="About"></iframe>
    </div>

  </div>
</div>

<div id="lightbox">
  <span id="lightbox-close">✕ close</span>
  <div id="lightbox-inner"></div>
</div>

<script>

const PROJECTS = {
  'volvo-bloom': {
    num:'01', context:'Volvo Design Competition 2026',
    tags:['Exterior Design','Interior Design','3D Modeling'],
    date:'Mar. 2026. (1 month)',
    path:'source/projects/volvo-bloom/',
    images: Array.from({length:16}, (_,i) => String(i+1).padStart(2,'0')+'.jpg'),
    vimeo: '<div style="padding:68.52% 0 0 0;position:relative;"><iframe src="https://player.vimeo.com/video/1188949481?badge=0&autopause=0&player_id=0&app_id=58479&autoplay=1&loop=1" frameborder="0" allow="autoplay; fullscreen; picture-in-picture; clipboard-write; encrypted-media; web-share" referrerpolicy="strict-origin-when-cross-origin" style="position:absolute;top:0;left:0;width:100%;height:100%;" title="BLOOM* (Volvo Design Competition 2026)"></iframe></div><script src="https://player.vimeo.com/api/player.js"><\/script>'
  },
  'hyundai-stormgazer': {
    num:'02', context:'HYUNDAI industry-academic cooperation',
    tags:['Exterior Design','3D Modeling'],
    date:'Jul. 2025. - Nov. 2025. (4 months)',
    path:'source/projects/hyundai-stormgazer/',
    images: Array.from({length:13}, (_,i) => String(i+1).padStart(2,'0')+'.jpg')
  },
  'polestar-play': {
    num:'03', context:'Polestar Design Contest 2024',
    tags:['Exterior Design','Interior Design', '3D Modeling'],
    date:'Apr. 2024. - May. 2024. (2 months)',
    path:'source/projects/polestar-play/',
    images: Array.from({length:12}, (_,i) => String(i+1).padStart(2,'0')+'.jpg')
  },
  'kia-gaia': {
    num:'04', context:'BA Thesis Project (wip)',
    tags:['Exterior Design', 'Interior Design', '3D Modeling'],
    date:'Apr. 2026. - Dec. 2026. (9 months)',
    path:'source/projects/kia-gaia/',
    images: Array.from({length:8}, (_,i) => String(i+1).padStart(2,'0')+'.jpg')
  },
  'side-projects': {
    num:'05', context:'Various',
    tags:['Sketching','Modeling'],
    date:'2024. –',
    path:'source/projects/side-projects/',
    images: ['01.jpg']
  }
};

let activeKey = '';
let lastActiveKey = null;

function initCoverLayers() {
  const container = document.getElementById('archive-cover');
  container.innerHTML = '';

  Object.keys(PROJECTS).forEach(key => {
    const p = PROJECTS[key];
    const picture = document.createElement('picture');
    picture.className = 'cover-layer';
    picture.dataset.coverKey = key;

    picture.innerHTML = `
      <source srcset="${p.path}webp/00.webp" type="image/webp">
      <img src="${p.path}jpg/00.jpg" alt="${p.num} Cover">
    `;
    container.appendChild(picture);
  });
}

function selectProject(key) {
  const p = PROJECTS[key];
  if (!p || activeKey === key) return;
  
  lastActiveKey = activeKey;
  activeKey = key;

  document.querySelectorAll('.project-nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.key === key);
  });

  const allLayers = document.querySelectorAll('.cover-layer');
  const nextLayer = document.querySelector(`.cover-layer[data-cover-key="${key}"]`);
  const prevLayer = lastActiveKey ? document.querySelector(`.cover-layer[data-cover-key="${lastActiveKey}"]`) : null;

  if (nextLayer) {
    allLayers.forEach(layer => {
      if (layer !== nextLayer && layer.classList.contains('active')) {
        layer.style.zIndex = '2'; 
      } else if (layer !== nextLayer) {
        layer.style.zIndex = '1';
      }
    });

    nextLayer.style.zIndex = '3';
    nextLayer.classList.add('active');

    if (prevLayer && prevLayer !== nextLayer) {
      const layerToHide = prevLayer;
      
      setTimeout(() => {
        if (activeKey !== layerToHide.dataset.coverKey) { 
          layerToHide.classList.remove('active');
          layerToHide.style.zIndex = '1';
        }
      }, 500);
    }
  }

  document.getElementById('meta-num').textContent     = p.num;
  document.getElementById('meta-context').textContent = p.context;
  document.getElementById('meta-date').textContent    = p.date;
  const tagsEl = document.getElementById('meta-tags');
  tagsEl.innerHTML = p.tags.map(t => `<span>${t}</span>`).join('');
}

// Sidebar clicks
document.querySelectorAll('.project-nav-item').forEach(el => {
  el.addEventListener('click', () => selectProject(el.dataset.key));
});

initCoverLayers();
selectProject('volvo-bloom');

document.getElementById('archive-cover').addEventListener('click', () => {
  if (activeKey === 'kia-gaia') return;
  const p = PROJECTS[activeKey];
  if (p) openLightbox(p.path, p.images, p.vimeo || null);
});

const pagesWrapper = document.getElementById('pages-wrapper');
const globalNav    = document.getElementById('global-nav');
const archivePage  = document.getElementById('page-archive');
let currentPage = 0;
let isAnimating = false;
const ANIM_MS   = 900;

function goToPage(n) {
  n = Math.max(0, Math.min(2, n));
  if (n === currentPage || isAnimating) return;
  currentPage = n;
  isAnimating = true;
  pagesWrapper.style.transform = `translateY(${n * -100}vh)`;
  document.getElementById('nav-archive').classList.toggle('active',    n === 0);
  document.getElementById('nav-sketchbook').classList.toggle('active', n === 1);
  document.getElementById('nav-about').classList.toggle('active',      n === 2);
  globalNav.classList.toggle('on-sketchbook', n === 1);
  setTimeout(() => { isAnimating = false; }, ANIM_MS);
}

document.getElementById('nav-archive').addEventListener('click',    e => { e.preventDefault(); goToPage(0); });
document.getElementById('nav-sketchbook').addEventListener('click', e => { e.preventDefault(); goToPage(1); });
document.getElementById('nav-about').addEventListener('click',      e => { e.preventDefault(); goToPage(2); });

let wheelAccum = 0, wheelTimer = null;
const WHEEL_THRESHOLD = 50;

window.addEventListener('wheel', (e) => {
  if (document.getElementById('lightbox').classList.contains('visible')) return;
  if (currentPage === 0) {
    const atBottom = archivePage.scrollTop + archivePage.clientHeight >= archivePage.scrollHeight - 4;
    const atTop    = archivePage.scrollTop <= 0;
    if (e.deltaY > 0 && !atBottom) return;
    if (e.deltaY < 0 && !atTop)    return;
    if (e.deltaY < 0 && atTop)     return;
  }
  wheelAccum += e.deltaY;
  clearTimeout(wheelTimer);
  wheelTimer = setTimeout(() => { wheelAccum = 0; }, 200);
  if (Math.abs(wheelAccum) < WHEEL_THRESHOLD) return;
  const dir = wheelAccum > 0 ? 1 : -1;
  wheelAccum = 0;
  if (!isAnimating) goToPage(currentPage + dir);
}, { passive:true });

let touchY0 = null;
window.addEventListener('touchstart', e => { touchY0 = e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', e => {
  if (touchY0 === null || isAnimating) return;
  const dy = touchY0 - e.changedTouches[0].clientY;
  touchY0 = null;
  if (Math.abs(dy) < 40) return;
  goToPage(currentPage + (dy > 0 ? 1 : -1));
}, {passive:true});

window.addEventListener('message', (e) => {
  if (e.data === 'scroll-up-edge'   && !isAnimating) goToPage(currentPage - 1);
  if (e.data === 'scroll-down-edge' && !isAnimating) goToPage(currentPage + 1);

  if (e.data && e.data.type === 'open-project-lightbox') {
    const targetKey = e.data.key;
    const p = PROJECTS[targetKey];
    
    if (p) {
      selectProject(targetKey);
      if (targetKey === 'kia-gaia') return; 
      
      // [수정] 넘겨받은 page 값을 openLightbox의 네 번째 인자로 전달
      const startPage = e.data.page || 1;
      openLightbox(p.path, p.images, p.vimeo || null, startPage);
    }
  }
});

function preloadProjectCovers() {
  Object.keys(PROJECTS).forEach(key => {
    const p = PROJECTS[key];
    
    const imgWebp = new Image();
    imgWebp.src = p.path + 'webp/00.webp';
    
    const imgJpg = new Image();
    imgJpg.src = p.path + 'jpg/00.jpg';
  });
}

preloadProjectCovers();

function openLightbox(path, images, vimeo, startPage = 1) {
  const lb    = document.getElementById('lightbox');
  const inner = document.getElementById('lightbox-inner');
  inner.innerHTML = '';

  // 1. Vimeo 동영상이 존재할 경우 상단에 삽입
  if (vimeo) {
    const wrap = document.createElement('div');
    wrap.id = 'lightbox-vimeo-wrap'; // 추적용 ID 추가
    wrap.style.cssText = 'width:60%; margin:0 auto 8px;';
    wrap.innerHTML = vimeo;
    inner.appendChild(wrap);
    if (!document.querySelector('script[src*="vimeo.com/api/player"]')) {
      const s = document.createElement('script');
      s.src = 'https://player.vimeo.com/api/player.js';
      document.head.appendChild(s);
    }
  }

  // 2. 이미지들을 순서대로 삽입하며 인덱스(1부터 시작) 부여
  images.forEach((f, idx) => {
    const webpFileName = f.replace(/\.(jpg|jpeg)$/i, '.webp');
    const webpSrc = path + 'webp/' + webpFileName;
    const jpgSrc  = path + 'jpg/' + f;

    const picture = document.createElement('picture');
    picture.dataset.pageIndex = idx + 1; // 페이지 번호 매핑

    const source = document.createElement('source');
    source.srcset = webpSrc;
    source.type = 'image/webp';
    picture.appendChild(source);

    const img = document.createElement('img');
    img.src = jpgSrc;
    img.alt = f;
    picture.appendChild(img);

    inner.appendChild(picture);
  });

  lb.style.display = 'block';
  lb.scrollTop = 0; // 팝업 시점 최상단(Vimeo 영상 위치) 강제 고정

  requestAnimationFrame(() => {
    lb.classList.add('visible');
    
    // [핵심 보완] startPage가 1보다 크거나, 아예 스케치북 전용 페이지 번호가 지정된 경우에만 스크롤 이동을 실행합니다.
    // 아카이브에서 일반 클릭으로 진입했거나(startPage = 1), Vimeo가 있는 첫 페이지일 때는 스크롤하지 않고 영상이 바로 보입니다.
    if (images.length > 0 && startPage > 1) {
      const targetPicture = inner.querySelector(`picture[data-page-index="${startPage}"]`);
      if (targetPicture) {
        const targetImg = targetPicture.querySelector('img');

        const scrollToTarget = () => {
          targetPicture.scrollIntoView({ behavior: 'auto', block: 'start' });
        };

        if (targetImg.complete && targetImg.naturalWidth) {
          setTimeout(scrollToTarget, 50);
        } else {
          targetImg.onload = () => {
            setTimeout(scrollToTarget, 100);
          };
          targetImg.onerror = scrollToTarget; 
        }
      }
    } else {
      // 아카이브 메뉴에서 진입 시: 다운로드 타이밍에 상관없이 무조건 스크롤을 맨 위(Vimeo 영상)로 유지
      lb.scrollTop = 0;
    }
  });
}

function closeLightbox() {
  const lb = document.getElementById('lightbox');
  lb.classList.remove('visible');
  setTimeout(() => { lb.style.display='none'; document.getElementById('lightbox-inner').innerHTML=''; }, 420);
}

document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e => {
  if(e.target.id === 'lightbox' || e.target.id === 'lightbox-inner') closeLightbox();
});

</script>
</body>
</html>
